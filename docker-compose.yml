services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind
      POSTGRES_DB: documind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/documind123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql://documind:documind@postgres:5432/documind
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: documind123
      ORCHESTRATOR_MODE: langgraph
      USE_LANGGRAPH: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      DOCUMIND_API_URL: http://api:8000
      ORCHESTRATOR_MODE: langgraph
      USE_LANGGRAPH: "true"
      POSTGRES_URL: postgresql://documind:documind@postgres:5432/documind
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: documind123
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - api
    volumes:
      - ./documents:/app/documents
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
      - ./data:/app/data

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
